services:
  - type: web
    name: nymblbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MYNOS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
